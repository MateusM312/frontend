<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de clientes</title>
</head>

<style>
    body{
        font-family: Arial, Helvetica, sans-serif;

    }
    header{
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 700px;
}   
</style>
<body>

    <header>
        <span>31/03/2026 09:00</span>
        <span>Mural de animais</span>
    </header>

    <h1>Informações Pessoais</h1>

    <fieldset>
        <legend>Cadastro de Clientes</legend>

    <form autocomplete="off" method="post">
         
        <label for="inome">Nome:</label>
        <input type="text" name="nome" id="inome" placeholder="Digite o nome do cliente" size="30px">
        <br>
        <br>
        
        <label for="iidade">Idade:</label>
        <input type="text" name="idade" id="iidade" placeholder="Digite sua idade">
        <br>
        <br>

        <label for="iendereço">Endereço:</label>
        <input type="text" name="endereço" id="iendereço" placeholder="Digite seu endereço" size="60px">
        <br>
        <br>

        <label for="icidade">Cidade:</label>
        <input type="text" name="cidade" id="icidade" placeholder="Digite sua cidade">
        <br>
        <br>

        <label for="iestado">Estado:</label>
        <input type="text" name="estado" id="iestado" placeholder="UF">
        <br>
        <br>

        <label for="icep">CEP:</label>
        <input type="text" name="cep" id="icep" placeholder="XXXXX-XXX">
        <br>
        <br>

        <label for="itelrel">Tel/Rel:</label>
        <input type="text" name="telrel" id="itelrel" placeholder="99 99999-9999">
        <br>
        <br>

        <label for="itelcel">Tel/Cel:</label>
        <input type="text" name="relcel" id="itelcel" placeholder="99 99999-9999">
        <br>
        <br>

        <label for="iemail">Email:</label>
        <input type="text" name="email" id="iemail" placeholder="Digite seu email" size="50px">
        <br>
        <br>

        <button type="submit">Enviar</button>

    </form>

    </fieldset>

</body>
</html>
